name: Jable Daily Scraper

on:
  schedule:
    - cron: '0 17 * * *'  # UTC 17:00 = 北京时间凌晨 01:00
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install "scrapling[all]" psycopg2-binary
          playwright install chromium

      - name: Run scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python main.py

      - name: Keep workflow alive
        run: |
          echo "Last run: $(date '+%Y-%m-%d %H:%M:%S')" > last_run.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_run.txt
          git commit -m "chore: update last run timestamp [skip ci]"
          git push
